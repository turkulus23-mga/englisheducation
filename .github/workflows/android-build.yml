name: Android Production Build

on:
  push:
    branches:
      - main

# ================= PERMISSIONS FIX =================
permissions:
  contents: write
  packages: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      VERSION_CODE: ${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      # ================= CACHE =================
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-${{ runner.os }}-

      # ================= JAVA =================
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # ================= CAPACITOR SYNC =================
      - name: Sync Capacitor
        run: npx cap sync android

      # ================= IMAGE TOOL =================
      - name: Setup ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      # ================= ICON GENERATION =================
      - name: Generate Adaptive Icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-{hdpi,mdpi,xhdpi,xxhdpi,xxxhdpi}

          convert appicon.png -resize 75% -gravity center -extent 1024x1024 padded_icon.png

          convert padded_icon.png -resize 432x432 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png
          convert padded_icon.png -resize 324x324 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png
          convert padded_icon.png -resize 216x216 android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png
          convert padded_icon.png -resize 162x162 android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png
          convert padded_icon.png -resize 108x108 android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png

          convert padded_icon.png -resize 432x432 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          convert padded_icon.png -resize 324x324 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert padded_icon.png -resize 216x216 android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert padded_icon.png -resize 162x162 android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert padded_icon.png -resize 108x108 android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png

      # ================= BACKGROUND =================
      - name: Create Transparent Background
        run: |
          mkdir -p android/app/src/main/res/drawable-v26
          cat > android/app/src/main/res/drawable-v26/ic_launcher_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@android:color/transparent"/>
          </adaptive-icon>
          EOF

      # ================= PLAY STORE ICON =================
      - name: Create Play Store Icon
        run: |
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          convert appicon.png -resize 75% -gravity center -extent 1024x1024 padded_icon.png

          convert padded_icon.png \
            -background "#0d1b2a" \
            -alpha remove \
            -alpha off \
            -resize 512x512 \
            android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      # ================= KEYSTORE =================
      - name: Decode Keystore
        run: |
          mkdir -p $HOME/.android-keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n' | base64 -d > $HOME/.android-keystore/release.jks

      # ================= GRADLE =================
      - name: Make Gradle executable
        run: chmod +x android/gradlew

      # ================= CLEAN ONCE =================
      - name: Clean Project
        working-directory: android
        run: ./gradlew clean --no-daemon

      # ================= DEBUG APK =================
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ================= RELEASE APK =================
      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_PATH: /home/runner/.android-keystore/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      # ================= AAB =================
      - name: Build Release AAB
        working-directory: android
        env:
          KEYSTORE_PATH: /home/runner/.android-keystore/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      # ================= UPLOAD DEBUG APK =================
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-teacher-debug-apk
          path: android/app/build/outputs/apk/**/app-*.apk

      # ================= UPLOAD RELEASE APK =================
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-teacher-release-apk
          path: android/app/build/outputs/apk/**/app-*.apk

      # ================= UPLOAD AAB =================
      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: ai-teacher-release-aab
          path: android/app/build/outputs/bundle/release/*.aab

      # ================= RELEASE NOTES =================
      - name: Generate Release Notes
        id: notes
        run: |
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log -5 --pretty=format:"- %s"
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ================= GITHUB RELEASE =================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## 🚀 Auto Release Notes

            ${{ steps.notes.outputs.CHANGELOG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ================= ATTACH APK + AAB =================
      - name: Upload Release Assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
