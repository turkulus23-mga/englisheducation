name: Android APK & AAB Build (Capacitor - Stable)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ================= CHECKOUT =================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ================= NODE (STABLE FIXED) =================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ================= INSTALL (FORCE CAPACITOR CLI) =================
      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap --version

      # ================= VERIFY PROJECT =================
      - name: Check project structure
        run: |
          ls -la
          ls -la www || echo "www folder missing"

      # ================= CAPACITOR SYNC (DIRECT BINARY FIX) =================
      - name: Sync Capacitor
        run: ./node_modules/.bin/cap sync android

      # ================= JAVA =================
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ================= GRADLE CACHE =================
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-v1

      # ================= GRADLE PERMISSIONS =================
      - name: Make Gradle executable
        run: chmod +x android/gradlew

      # ================= CLEAN =================
      - name: Clean Android project
        working-directory: android
        run: ./gradlew clean --no-daemon

      # ================= DEBUG APK =================
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ================= RELEASE APK =================
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      # ================= AAB =================
      - name: Build AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      # ================= UPLOAD DEBUG APK =================
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      # ================= UPLOAD RELEASE APK =================
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/*.apk

      # ================= UPLOAD AAB =================
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: android/app/build/outputs/bundle/release/*.aab

      # ================= RELEASE =================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            🚀 Capacitor Android Build Successful

            ✔ Debug APK
            ✔ Release APK
            ✔ AAB (Play Store Ready)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
